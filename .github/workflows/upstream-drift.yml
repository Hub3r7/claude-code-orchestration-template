name: Upstream drift

on:
  schedule:
    - cron: "17 6 1 * *" # monthly, 1st at 06:17 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check vendored agent-skills against upstream HEAD
        run: bash scripts/check-upstream-drift.sh
